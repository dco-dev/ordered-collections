name: Clojure CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25.0.2"
          cache: maven

      - name: Install Clojure tooling
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          cli: latest
          lein: latest
          bb: latest

      - name: Show tool versions
        run: |
          java --version
          clojure -Sdescribe
          lein version
          bb --version

      - name: Run Leiningen tests
        run: lein test

      - name: Run tools.deps tests
        run: clojure -M:test
