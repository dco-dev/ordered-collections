<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">500K snapshot</title>
  <desc id="desc">Radar-like categorical comparison showing major 500K speedups across set algebra, equality, split, fold, construction, and lookup.</desc>
  <style>
    .bg { fill: #faf8f1; }
    .title { font: 700 24px Georgia, serif; fill: #191919; }
    .subtitle { font: 13px Georgia, serif; fill: #615f58; }
    .ring { fill: none; stroke: #e2dccf; stroke-width: 1; }
    .axis { stroke: #d1cabd; stroke-width: 1; }
    .poly { fill: rgba(61,139,116,0.16); stroke: #3d8b74; stroke-width: 3; }
    .label { font: 13px Georgia, serif; fill: #2c2a26; }
    .value { font: 12px Menlo, monospace; fill: #2c2a26; }
  </style>
  <rect class="bg" width="900" height="420"/>
  <text class="title" x="28" y="34">500K Snapshot</text>
  <text class="subtitle" x="28" y="56">A single-frame summary of where the design pays off most in the last full benchmark run.</text>

  <g transform="translate(450 245)">
    <circle class="ring" r="60"/>
    <circle class="ring" r="100"/>
    <circle class="ring" r="140"/>
    <circle class="ring" r="180"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="-180"/>
    <line class="axis" x1="0" y1="0" x2="156" y2="-90"/>
    <line class="axis" x1="0" y1="0" x2="156" y2="90"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="180"/>
    <line class="axis" x1="0" y1="0" x2="-156" y2="90"/>
    <line class="axis" x1="0" y1="0" x2="-156" y2="-90"/>

    <polygon class="poly" points="0,-180 111,-64 61,35 0,52 -94,54 -70,-40"/>

    <text class="label" x="-34" y="-196">set algebra</text>
    <text class="value" x="-21" y="-178">56.6x</text>

    <text class="label" x="168" y="-96">equality</text>
    <text class="value" x="168" y="-78">11.5x</text>

    <text class="label" x="168" y="106">split-key</text>
    <text class="value" x="168" y="124">7.8x</text>

    <text class="label" x="-24" y="206">fold</text>
    <text class="value" x="-27" y="224">6.1x</text>

    <text class="label" x="-245" y="106">construction</text>
    <text class="value" x="-230" y="124">2.3x</text>

    <text class="label" x="-232" y="-96">lookup</text>
    <text class="value" x="-218" y="-78">1.2x</text>
  </g>
</svg>
