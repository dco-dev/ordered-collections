<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Set algebra speedup trends</title>
  <desc id="desc">Three-panel line chart showing ordered-set speedups versus hash-set, sorted-set, and data.avl across union, intersection, and difference for N 10K, 100K, and 500K.</desc>
  <style>
    .bg { fill: #faf8f1; }
    .panel { fill: #fffdf8; stroke: #ddd6c7; stroke-width: 1; }
    .title { font: 700 24px Georgia, serif; fill: #191919; }
    .subtitle { font: 13px Georgia, serif; fill: #615f58; }
    .ptitle { font: 700 14px Georgia, serif; fill: #2b2a27; }
    .axis { stroke: #bdb5a7; stroke-width: 1; }
    .grid { stroke: #e9e3d8; stroke-width: 1; }
    .label { font: 12px Menlo, monospace; fill: #353430; }
    .tick { font: 11px Menlo, monospace; fill: #605d57; }
    .u { stroke: #c55a11; fill: none; stroke-width: 3; }
    .i { stroke: #2f7d6b; fill: none; stroke-width: 3; }
    .d { stroke: #3f6fb5; fill: none; stroke-width: 3; }
    .dotu { fill: #c55a11; }
    .doti { fill: #2f7d6b; }
    .dotd { fill: #3f6fb5; }
    .legend { font: 12px Georgia, serif; fill: #2b2a27; }
  </style>
  <rect class="bg" width="900" height="430"/>
  <text class="title" x="28" y="34">Set Algebra Speedup Trends</text>
  <text class="subtitle" x="28" y="56">How far ordered-set pulls away as size grows. Each panel shows competitor mean time divided by ordered-set mean time.</text>

  <rect class="panel" x="28" y="84" width="266" height="298" rx="10"/>
  <rect class="panel" x="316" y="84" width="266" height="298" rx="10"/>
  <rect class="panel" x="604" y="84" width="266" height="298" rx="10"/>

  <text class="ptitle" x="48" y="110">vs hash-set / clojure.set</text>
  <text class="ptitle" x="336" y="110">vs sorted-set / clojure.set</text>
  <text class="ptitle" x="624" y="110">vs data.avl / clojure.set</text>

  <g transform="translate(28 84)">
    <line class="axis" x1="44" y1="262" x2="242" y2="262"/>
    <line class="axis" x1="44" y1="36" x2="44" y2="262"/>
    <line class="grid" x1="44" y1="217" x2="242" y2="217"/>
    <line class="grid" x1="44" y1="172" x2="242" y2="172"/>
    <line class="grid" x1="44" y1="127" x2="242" y2="127"/>
    <line class="grid" x1="44" y1="82" x2="242" y2="82"/>
    <text class="tick" x="18" y="266">0x</text>
    <text class="tick" x="10" y="221">5x</text>
    <text class="tick" x="5" y="176">10x</text>
    <text class="tick" x="5" y="131">15x</text>
    <text class="tick" x="5" y="86">20x</text>
    <text class="tick" x="36" y="282">10K</text>
    <text class="tick" x="124" y="282">100K</text>
    <text class="tick" x="210" y="282">500K</text>
    <polyline class="u" points="52,213 143,181 234,116"/>
    <polyline class="i" points="52,228 143,207 234,146"/>
    <polyline class="d" points="52,222 143,193 234,95"/>
    <circle class="dotu" cx="52" cy="213" r="4"/><circle class="dotu" cx="143" cy="181" r="4"/><circle class="dotu" cx="234" cy="116" r="4"/>
    <circle class="doti" cx="52" cy="228" r="4"/><circle class="doti" cx="143" cy="207" r="4"/><circle class="doti" cx="234" cy="146" r="4"/>
    <circle class="dotd" cx="52" cy="222" r="4"/><circle class="dotd" cx="143" cy="193" r="4"/><circle class="dotd" cx="234" cy="95" r="4"/>
  </g>

  <g transform="translate(316 84)">
    <line class="axis" x1="44" y1="262" x2="242" y2="262"/>
    <line class="axis" x1="44" y1="36" x2="44" y2="262"/>
    <line class="grid" x1="44" y1="217" x2="242" y2="217"/>
    <line class="grid" x1="44" y1="172" x2="242" y2="172"/>
    <line class="grid" x1="44" y1="127" x2="242" y2="127"/>
    <line class="grid" x1="44" y1="82" x2="242" y2="82"/>
    <line class="grid" x1="44" y1="46" x2="242" y2="46"/>
    <text class="tick" x="18" y="266">0x</text>
    <text class="tick" x="10" y="221">10x</text>
    <text class="tick" x="10" y="176">20x</text>
    <text class="tick" x="10" y="131">30x</text>
    <text class="tick" x="10" y="86">40x</text>
    <text class="tick" x="10" y="50">50x</text>
    <text class="tick" x="36" y="282">10K</text>
    <text class="tick" x="124" y="282">100K</text>
    <text class="tick" x="210" y="282">500K</text>
    <polyline class="u" points="52,193 143,143 234,58"/>
    <polyline class="i" points="52,220 143,186 234,99"/>
    <polyline class="d" points="52,217 143,163 234,81"/>
    <circle class="dotu" cx="52" cy="193" r="4"/><circle class="dotu" cx="143" cy="143" r="4"/><circle class="dotu" cx="234" cy="58" r="4"/>
    <circle class="doti" cx="52" cy="220" r="4"/><circle class="doti" cx="143" cy="186" r="4"/><circle class="doti" cx="234" cy="99" r="4"/>
    <circle class="dotd" cx="52" cy="217" r="4"/><circle class="dotd" cx="143" cy="163" r="4"/><circle class="dotd" cx="234" cy="81" r="4"/>
  </g>

  <g transform="translate(604 84)">
    <line class="axis" x1="44" y1="262" x2="242" y2="262"/>
    <line class="axis" x1="44" y1="36" x2="44" y2="262"/>
    <line class="grid" x1="44" y1="217" x2="242" y2="217"/>
    <line class="grid" x1="44" y1="172" x2="242" y2="172"/>
    <line class="grid" x1="44" y1="127" x2="242" y2="127"/>
    <line class="grid" x1="44" y1="82" x2="242" y2="82"/>
    <line class="grid" x1="44" y1="46" x2="242" y2="46"/>
    <text class="tick" x="18" y="266">0x</text>
    <text class="tick" x="10" y="221">10x</text>
    <text class="tick" x="10" y="176">20x</text>
    <text class="tick" x="10" y="131">30x</text>
    <text class="tick" x="10" y="86">40x</text>
    <text class="tick" x="36" y="282">10K</text>
    <text class="tick" x="124" y="282">100K</text>
    <text class="tick" x="210" y="282">500K</text>
    <polyline class="u" points="52,213 143,169 234,73"/>
    <polyline class="i" points="52,229 143,204 234,135"/>
    <polyline class="d" points="52,229 143,206 234,117"/>
    <circle class="dotu" cx="52" cy="213" r="4"/><circle class="dotu" cx="143" cy="169" r="4"/><circle class="dotu" cx="234" cy="73" r="4"/>
    <circle class="doti" cx="52" cy="229" r="4"/><circle class="doti" cx="143" cy="204" r="4"/><circle class="doti" cx="234" cy="135" r="4"/>
    <circle class="dotd" cx="52" cy="229" r="4"/><circle class="dotd" cx="143" cy="206" r="4"/><circle class="dotd" cx="234" cy="117" r="4"/>
  </g>

  <circle class="dotu" cx="86" cy="402" r="5"/><text class="legend" x="98" y="406">union</text>
  <circle class="doti" cx="160" cy="402" r="5"/><text class="legend" x="172" y="406">intersection</text>
  <circle class="dotd" cx="265" cy="402" r="5"/><text class="legend" x="277" y="406">difference</text>
</svg>
