<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Other operation speedups at N equals 500K</title>
  <desc id="desc">Horizontal bars showing ordered-collections speedups at N equals 500K for split-key, frequency-map fold, map construction, and map lookup.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .title { font: 700 20px Georgia, serif; fill: #1d1d1b; }
    .subtitle { font: 12px Georgia, serif; fill: #5d5d57; }
    .label { font: 13px Menlo, monospace; fill: #242420; }
    .value { font: 12px Menlo, monospace; fill: #242420; }
    .axis { stroke: #b8b3a7; stroke-width: 1; }
    .strong { fill: #3c8f76; }
    .mid { fill: #4d88c7; }
    .mild { fill: #c99a3a; }
  </style>
  <rect class="bg" x="0" y="0" width="760" height="300"/>
  <text class="title" x="24" y="32">Other Important Speedups at N=500K</text>
  <text class="subtitle" x="24" y="52">Split and non-trivial fold stand out; map construction is solid; lookup stays near parity</text>
  <line class="axis" x1="240" y1="72" x2="720" y2="72"/>
  <line class="axis" x1="240" y1="72" x2="240" y2="276"/>

  <rect class="strong" x="240" y="92" width="468" height="16" rx="2"/>
  <text class="label" x="24" y="105">split-key vs data.avl</text>
  <text class="value" x="650" y="105">7.8x</text>

  <rect class="strong" x="240" y="120" width="312" height="16" rx="2"/>
  <text class="label" x="24" y="133">fold(freq) vs sorted-set</text>
  <text class="value" x="560" y="133">5.2x</text>

  <rect class="strong" x="240" y="148" width="366" height="16" rx="2"/>
  <text class="label" x="24" y="161">fold(freq) vs data.avl</text>
  <text class="value" x="614" y="161">6.1x</text>

  <rect class="mid" x="240" y="176" width="138" height="16" rx="2"/>
  <text class="label" x="24" y="189">map construction vs sorted-map</text>
  <text class="value" x="386" y="189">2.3x</text>

  <rect class="mid" x="240" y="204" width="96" height="16" rx="2"/>
  <text class="label" x="24" y="217">map construction vs data.avl</text>
  <text class="value" x="344" y="217">1.6x</text>

  <rect class="mild" x="240" y="232" width="72" height="16" rx="2"/>
  <text class="label" x="24" y="245">map lookup vs sorted-map</text>
  <text class="value" x="320" y="245">1.2x</text>

  <rect class="mild" x="240" y="260" width="60" height="16" rx="2"/>
  <text class="label" x="24" y="273">map lookup vs data.avl</text>
  <text class="value" x="308" y="273">1.0x</text>
</svg>
