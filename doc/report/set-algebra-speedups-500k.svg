<svg xmlns="http://www.w3.org/2000/svg" width="760" height="290" viewBox="0 0 760 290" role="img" aria-labelledby="title desc">
  <title id="title">Set algebra speedups at N equals 500K</title>
  <desc id="desc">Grouped horizontal bars showing ordered-set speedups over hash-set, sorted-set, and data.avl for union, intersection, and difference at N equals 500K.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .title { font: 700 20px Georgia, serif; fill: #1d1d1b; }
    .subtitle { font: 12px Georgia, serif; fill: #5d5d57; }
    .label { font: 13px Menlo, monospace; fill: #242420; }
    .value { font: 12px Menlo, monospace; fill: #242420; }
    .axis { stroke: #b8b3a7; stroke-width: 1; }
    .hash { fill: #7aa95c; }
    .sorted { fill: #d8873a; }
    .avl { fill: #4d88c7; }
    .legend { font: 12px Georgia, serif; fill: #242420; }
  </style>
  <rect class="bg" x="0" y="0" width="760" height="290"/>
  <text class="title" x="24" y="32">Set Algebra Speedups at N=500K</text>
  <text class="subtitle" x="24" y="52">Speedup = competitor mean time / ordered-set mean time</text>
  <line class="axis" x1="180" y1="72" x2="720" y2="72"/>
  <line class="axis" x1="180" y1="72" x2="180" y2="270"/>

  <rect class="hash" x="180" y="90" width="114" height="14" rx="2"/>
  <text class="label" x="24" y="102">union vs hash-set</text>
  <text class="value" x="302" y="102">16.3x</text>

  <rect class="sorted" x="180" y="110" width="396" height="14" rx="2"/>
  <text class="label" x="24" y="122">union vs sorted-set</text>
  <text class="value" x="584" y="122">56.6x</text>

  <rect class="avl" x="180" y="130" width="295" height="14" rx="2"/>
  <text class="label" x="24" y="142">union vs data.avl</text>
  <text class="value" x="483" y="142">42.1x</text>

  <rect class="hash" x="180" y="160" width="90" height="14" rx="2"/>
  <text class="label" x="24" y="172">intersection vs hash-set</text>
  <text class="value" x="278" y="172">12.9x</text>

  <rect class="sorted" x="180" y="180" width="253" height="14" rx="2"/>
  <text class="label" x="24" y="192">intersection vs sorted-set</text>
  <text class="value" x="441" y="192">36.2x</text>

  <rect class="avl" x="180" y="200" width="197" height="14" rx="2"/>
  <text class="label" x="24" y="212">intersection vs data.avl</text>
  <text class="value" x="385" y="212">28.1x</text>

  <rect class="hash" x="180" y="230" width="130" height="14" rx="2"/>
  <text class="label" x="24" y="242">difference vs hash-set</text>
  <text class="value" x="318" y="242">18.6x</text>

  <rect class="sorted" x="180" y="250" width="351" height="14" rx="2"/>
  <text class="label" x="24" y="262">difference vs sorted-set</text>
  <text class="value" x="539" y="262">50.1x</text>

  <rect class="avl" x="180" y="270" width="224" height="14" rx="2"/>
  <text class="label" x="24" y="282">difference vs data.avl</text>
  <text class="value" x="412" y="282">32.0x</text>

  <rect class="hash" x="575" y="22" width="12" height="12" rx="2"/>
  <text class="legend" x="593" y="32">hash-set</text>
  <rect class="sorted" x="648" y="22" width="12" height="12" rx="2"/>
  <text class="legend" x="666" y="32">sorted-set</text>
  <rect class="avl" x="575" y="42" width="12" height="12" rx="2"/>
  <text class="legend" x="593" y="52">data.avl</text>
</svg>
