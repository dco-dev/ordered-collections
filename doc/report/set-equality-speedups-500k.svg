<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Set equality speedups at N equals 500K</title>
  <desc id="desc">Horizontal bars showing ordered-set speedups over hash-set, sorted-set, and data.avl for equal and one-different equality workloads at N equals 500K.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .title { font: 700 20px Georgia, serif; fill: #1d1d1b; }
    .subtitle { font: 12px Georgia, serif; fill: #5d5d57; }
    .label { font: 13px Menlo, monospace; fill: #242420; }
    .value { font: 12px Menlo, monospace; fill: #242420; }
    .axis { stroke: #b8b3a7; stroke-width: 1; }
    .hash { fill: #7aa95c; }
    .sorted { fill: #d8873a; }
    .avl { fill: #4d88c7; }
    .legend { font: 12px Georgia, serif; fill: #242420; }
  </style>
  <rect class="bg" x="0" y="0" width="760" height="260"/>
  <text class="title" x="24" y="32">Set Equality Speedups at N=500K</text>
  <text class="subtitle" x="24" y="52">Equal sets are especially strong; one-different stays strong against ordered competitors</text>
  <line class="axis" x1="220" y1="72" x2="720" y2="72"/>
  <line class="axis" x1="220" y1="72" x2="220" y2="236"/>

  <rect class="hash" x="220" y="90" width="92" height="16" rx="2"/>
  <text class="label" x="24" y="103">equal vs hash-set</text>
  <text class="value" x="320" y="103">2.3x</text>

  <rect class="sorted" x="220" y="114" width="452" height="16" rx="2"/>
  <text class="label" x="24" y="127">equal vs sorted-set</text>
  <text class="value" x="680" y="127">11.3x</text>

  <rect class="avl" x="220" y="138" width="460" height="16" rx="2"/>
  <text class="label" x="24" y="151">equal vs data.avl</text>
  <text class="value" x="688" y="151">11.5x</text>

  <rect class="hash" x="220" y="176" width="92" height="16" rx="2"/>
  <text class="label" x="24" y="185">one-different vs hash-set</text>
  <text class="value" x="320" y="185">2.3x</text>

  <rect class="sorted" x="220" y="200" width="512" height="16" rx="2"/>
  <text class="label" x="24" y="213">one-different vs sorted-set</text>
  <text class="value" x="685" y="213">12.8x</text>

  <rect class="avl" x="220" y="224" width="536" height="16" rx="2"/>
  <text class="label" x="24" y="237">one-different vs data.avl</text>
  <text class="value" x="694" y="237">13.4x</text>

  <rect class="hash" x="570" y="22" width="12" height="12" rx="2"/>
  <text class="legend" x="588" y="32">hash-set</text>
  <rect class="sorted" x="640" y="22" width="12" height="12" rx="2"/>
  <text class="legend" x="658" y="32">sorted-set</text>
  <rect class="avl" x="570" y="42" width="12" height="12" rx="2"/>
  <text class="legend" x="588" y="52">data.avl</text>
</svg>
