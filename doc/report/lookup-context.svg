<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Lookup context</title>
  <desc id="desc">Line chart showing ordered-map lookup speedup versus sorted-map and data.avl across 10K, 100K, and 500K, emphasizing near parity.</desc>
  <style>
    .bg { fill: #faf8f1; }
    .panel { fill: #fffdf8; stroke: #ddd6c7; stroke-width: 1; }
    .title { font: 700 24px Georgia, serif; fill: #191919; }
    .subtitle { font: 13px Georgia, serif; fill: #615f58; }
    .axis { stroke: #bdb5a7; stroke-width: 1; }
    .grid { stroke: #e9e3d8; stroke-width: 1; }
    .tick { font: 11px Menlo, monospace; fill: #605d57; }
    .line1 { stroke: #c67b39; fill: none; stroke-width: 3; }
    .line2 { stroke: #4c7fc1; fill: none; stroke-width: 3; }
    .d1 { fill: #c67b39; }
    .d2 { fill: #4c7fc1; }
    .legend { font: 12px Georgia, serif; fill: #2b2a27; }
  </style>
  <rect class="bg" width="900" height="300"/>
  <text class="title" x="28" y="34">Lookup Context</text>
  <text class="subtitle" x="28" y="56">This is intentionally the quiet chart: ordered-map lookup is good, but it is not the library’s main differentiator.</text>
  <rect class="panel" x="28" y="82" width="844" height="188" rx="10"/>

  <line class="axis" x1="88" y1="240" x2="840" y2="240"/>
  <line class="axis" x1="88" y1="112" x2="88" y2="240"/>
  <line class="grid" x1="88" y1="208" x2="840" y2="208"/>
  <line class="grid" x1="88" y1="176" x2="840" y2="176"/>
  <line class="grid" x1="88" y1="144" x2="840" y2="144"/>
  <text class="tick" x="56" y="244">1.0x</text>
  <text class="tick" x="56" y="212">1.1x</text>
  <text class="tick" x="56" y="180">1.2x</text>
  <text class="tick" x="56" y="148">1.3x</text>
  <text class="tick" x="110" y="258">10K</text>
  <text class="tick" x="450" y="258">100K</text>
  <text class="tick" x="780" y="258">500K</text>

  <polyline class="line1" points="120,144 460,176 800,160"/>
  <polyline class="line2" points="120,144 460,176 800,240"/>
  <circle class="d1" cx="120" cy="144" r="5"/><circle class="d1" cx="460" cy="176" r="5"/><circle class="d1" cx="800" cy="160" r="5"/>
  <circle class="d2" cx="120" cy="144" r="5"/><circle class="d2" cx="460" cy="176" r="5"/><circle class="d2" cx="800" cy="240" r="5"/>

  <text class="legend" x="110" y="102">ordered-map vs sorted-map</text>
  <text class="legend" x="330" y="102">ordered-map vs data.avl</text>
  <rect x="88" y="93" width="12" height="12" rx="2" fill="#c67b39"/>
  <rect x="305" y="93" width="12" height="12" rx="2" fill="#4c7fc1"/>
</svg>
