<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 480" font-family="Georgia, serif">

  <text x="370" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">One Kernel, Eleven Collections</text>

  <!-- Central kernel -->
  <ellipse cx="370" cy="240" rx="110" ry="45" fill="#2c3e50" opacity="0.95"/>
  <text x="370" y="233" text-anchor="middle" font-size="12" font-weight="bold" fill="white">tree.clj</text>
  <text x="370" y="250" text-anchor="middle" font-size="9" fill="#bdc3c7">~2000 lines</text>
  <text x="370" y="263" text-anchor="middle" font-size="8" fill="#95a5a6">split · join · stitch · fold</text>

  <!-- Extension points labels -->
  <text x="370" y="180" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">*compare*    *t-join*</text>

  <!-- Ordered collections (top left) -->
  <rect x="20" y="60" width="130" height="32" rx="6" fill="#3498db"/>
  <text x="85" y="81" text-anchor="middle" font-size="10" fill="white">ordered-set</text>

  <rect x="20" y="100" width="130" height="32" rx="6" fill="#3498db"/>
  <text x="85" y="121" text-anchor="middle" font-size="10" fill="white">ordered-map</text>

  <!-- Primitive specialized (top) -->
  <rect x="170" y="42" width="130" height="28" rx="6" fill="#2980b9"/>
  <text x="235" y="61" text-anchor="middle" font-size="9" fill="white">long-ordered-set</text>

  <rect x="170" y="78" width="130" height="28" rx="6" fill="#2980b9"/>
  <text x="235" y="97" text-anchor="middle" font-size="9" fill="white">double-ordered-set</text>

  <rect x="170" y="114" width="130" height="28" rx="6" fill="#2980b9"/>
  <text x="235" y="133" text-anchor="middle" font-size="9" fill="white">string-ordered-set</text>

  <!-- Augmented (top right) -->
  <rect x="440" y="55" width="130" height="32" rx="6" fill="#e67e22"/>
  <text x="505" y="76" text-anchor="middle" font-size="10" fill="white">interval-set</text>

  <rect x="440" y="95" width="130" height="32" rx="6" fill="#e67e22"/>
  <text x="505" y="116" text-anchor="middle" font-size="10" fill="white">interval-map</text>

  <rect x="590" y="75" width="130" height="32" rx="6" fill="#d35400"/>
  <text x="655" y="96" text-anchor="middle" font-size="10" fill="white">segment-tree</text>

  <!-- Semantic variants (bottom left) -->
  <rect x="20" y="350" width="130" height="32" rx="6" fill="#1abc9c"/>
  <text x="85" y="371" text-anchor="middle" font-size="10" fill="white">fuzzy-set</text>

  <rect x="20" y="390" width="130" height="32" rx="6" fill="#1abc9c"/>
  <text x="85" y="411" text-anchor="middle" font-size="10" fill="white">fuzzy-map</text>

  <rect x="170" y="370" width="130" height="32" rx="6" fill="#16a085"/>
  <text x="235" y="391" text-anchor="middle" font-size="10" fill="white">priority-queue</text>

  <rect x="170" y="410" width="130" height="32" rx="6" fill="#16a085"/>
  <text x="235" y="431" text-anchor="middle" font-size="10" fill="white">multiset</text>

  <!-- Range map (bottom) -->
  <rect x="440" y="380" width="130" height="32" rx="6" fill="#9b59b6"/>
  <text x="505" y="401" text-anchor="middle" font-size="10" fill="white">range-map</text>

  <!-- Rope (bottom right, highlighted) -->
  <rect x="590" y="360" width="130" height="55" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="655" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="white">rope</text>
  <text x="655" y="400" text-anchor="middle" font-size="8" fill="#f5b7b1">no comparator</text>
  <text x="655" y="412" text-anchor="middle" font-size="8" fill="#f5b7b1">implicit index</text>

  <!-- Lines from kernel to collections -->
  <line x1="290" y1="210" x2="150" y2="92" stroke="#3498db" stroke-width="1.2" opacity="0.5"/>
  <line x1="290" y1="220" x2="150" y2="116" stroke="#3498db" stroke-width="1.2" opacity="0.5"/>
  <line x1="310" y1="200" x2="235" y2="106" stroke="#2980b9" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="200" x2="235" y2="78" stroke="#2980b9" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="200" x2="235" y2="142" stroke="#2980b9" stroke-width="1" opacity="0.4"/>
  <line x1="450" y1="210" x2="505" y2="87" stroke="#e67e22" stroke-width="1.2" opacity="0.5"/>
  <line x1="450" y1="215" x2="505" y2="111" stroke="#e67e22" stroke-width="1.2" opacity="0.5"/>
  <line x1="470" y1="205" x2="590" y2="91" stroke="#d35400" stroke-width="1.2" opacity="0.5"/>
  <line x1="290" y1="270" x2="85" y2="350" stroke="#1abc9c" stroke-width="1.2" opacity="0.5"/>
  <line x1="290" y1="275" x2="85" y2="390" stroke="#1abc9c" stroke-width="1.2" opacity="0.5"/>
  <line x1="310" y1="280" x2="235" y2="370" stroke="#16a085" stroke-width="1.2" opacity="0.5"/>
  <line x1="310" y1="280" x2="235" y2="410" stroke="#16a085" stroke-width="1.2" opacity="0.5"/>
  <line x1="440" y1="270" x2="505" y2="380" stroke="#9b59b6" stroke-width="1.2" opacity="0.5"/>
  <line x1="470" y1="275" x2="590" y2="375" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>

  <!-- Category labels -->
  <text x="85" y="50" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="bold">Ordered</text>
  <text x="235" y="36" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="bold">Specialized</text>
  <text x="505" y="47" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">Augmented</text>
  <text x="85" y="340" text-anchor="middle" font-size="9" fill="#1abc9c" font-weight="bold">Nearest-Neighbor</text>
  <text x="235" y="360" text-anchor="middle" font-size="9" fill="#16a085" font-weight="bold">Duplicate-Tolerant</text>
  <text x="505" y="370" text-anchor="middle" font-size="9" fill="#9b59b6" font-weight="bold">Range</text>
  <text x="655" y="350" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">Positional</text>

  <!-- Bottom note -->
  <text x="370" y="468" text-anchor="middle" font-size="10" font-style="italic" fill="#555">Adding a collection type requires no kernel changes — only a constructor that configures the two hooks.</text>
</svg>
